<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Community Web Build</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #101415;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      image-rendering: auto;
      background: #101415;
    }

    #status {
      position: absolute;
      left: 12px;
      bottom: 10px;
      color: #e8f1f1;
      font: 12px/1.3 monospace;
      background: rgba(0, 0, 0, 0.45);
      padding: 6px 8px;
      border-radius: 6px;
      pointer-events: none;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas" tabindex="-1"></canvas>
    <div id="status">loading...</div>
  </div>

  <script>
    var statusEl = document.getElementById("status");

    var Module = {
      canvas: document.getElementById("canvas"),
      printErr: function(text) {
        console.error(text);
      },
      setStatus: function(text) {
        if (statusEl) {
          statusEl.textContent = text;
        }
      },
      onRuntimeInitialized: function() {
        Module.setStatus("running");
      }
    };

    window.addEventListener("error", function() {
      Module.setStatus("runtime error");
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
